<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#000000">
    <meta name="description" content="Camera text extraction with ChatGPT">
    <title>Text Extractor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #000;
            color: #fff;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: row;
            overflow: hidden;
            position: fixed;
            inset: 0;
            padding-top: 15px;
        }

        #video-container {
            flex: 0 0 50%;
            width: 50%;
            height: 100%;
            position: relative;
            background: #000;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            order: 2;
        }

        #video {
            height: 51%;
            width: 85%;
            object-fit: cover;
            align-self: center;
        }

        #canvas {
            display: none;
        }

        .controls {
            padding: 15px;
            background: #1a1a1a;
            display: flex;
            gap: 10px;
            justify-content: center;
            align-items: center;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            touch-action: manipulation;
        }

        #go-btn {
            background: #10a37f;
            color: white;
            padding: 16px 32px;
            font-size: 18px;
            width: 40%;
            min-width: auto;
        }

        #go-btn:active {
            transform: scale(0.95);
            background: #0d8b6f;
        }

        #go-btn:disabled {
            background: #666;
            cursor: not-allowed;
            opacity: 0.5;
        }

        #api-key-input {
            padding: 10px 12px;
            font-size: 14px;
            border: 1px solid #444;
            border-radius: 6px;
            background: #1a1a1a;
            color: #fff;
            width: 200px;
            font-family: monospace;
            resize: none;
            min-height: 60px;
        }

        #api-key-input:focus {
            outline: none;
            border-color: #10a37f;
            box-shadow: 0 0 0 2px rgba(16, 163, 127, 0.2);
        }

        #result {
            flex: 0 0 50%;
            width: 50%;
            height: 100%;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 15px;
            background: #000;
            font-size: 14px;
            line-height: 1.4;
            white-space: pre-wrap;
            word-break: break-word;
            border-right: 1px solid #333;
            overscroll-behavior: contain;
            -webkit-overflow-scrolling: touch;
            order: 1;
        }

        .hidden {
            display: none;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #666;
            border-top: 2px solid #10a37f;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            color: #ff6b6b;
        }

        .success {
            color: #10a37f;
        }

        .toggle-container {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #1a1a1a;
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #333;
        }

        .toggle-label {
            font-size: 12px;
            color: #aaa;
            min-width: 50px;
        }

        .toggle-switch {
            position: relative;
            width: 50px;
            height: 26px;
            background: #444;
            border-radius: 13px;
            cursor: pointer;
            transition: background 0.3s;
            border: none;
            padding: 0;
        }

        .toggle-switch.active {
            background: #10a37f;
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 22px;
            height: 22px;
            background: white;
            border-radius: 11px;
            top: 2px;
            left: 2px;
            transition: left 0.3s;
        }

        .toggle-switch.active::after {
            left: 26px;
        }

        .provider-label {
            font-size: 12px;
            color: #aaa;
            min-width: 45px;
            text-align: right;
        }

        .controls-top {
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: center;
        }

        @media (orientation: landscape) and (max-height: 430px) {
            #result {
                flex: 0 0 35%;
                width: 35%;
                padding: 10px;
            }

            #video-container {
                flex: 0 0 65%;
                width: 65%;
            }

            #video {
                height: 40%;
                width: 78%;
            }

            .controls {
                padding: 8px;
                gap: 12px;
                flex-direction: column;
                justify-content: flex-start;
            }

            #api-key-input {
                width: 90%;
                font-size: 12px;
                padding: 10px;
                min-width: 0;
                min-height: 50px;
            }

            #go-btn {
                width: 90%;
                font-size: 16px;
                padding: 20px 12px;
                height: 90px;
            }

            #result {
                overflow-x: hidden;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
            }
        }

        .version {
            position: fixed;
            top: 10px;
            right: 10px;
            font-size: 12px;
            color: #888;
            background: rgba(0, 0, 0, 0.7);
            padding: 5px 10px;
            border-radius: 4px;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="version">v2.0.0</div>
    <div id="result"></div>

    <div id="video-container">
        <video id="video" playsinline autoplay></video>
        <canvas id="canvas"></canvas>
        <div class="controls">
            <div class="controls-top">
                <button id="go-btn">Go</button>
                <div class="toggle-container">
                    <span class="toggle-label">Tool:</span>
                    <button id="provider-toggle" class="toggle-switch active" aria-label="Toggle between OpenAI and Perplexity"></button>
                    <span class="provider-label" id="provider-name">openai</span>
                </div>
            </div>
            <textarea id="api-key-input" placeholder='{"openai": "your-key", "perplexity": "your-key"}'></textarea>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
