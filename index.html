<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#000000">
    <meta name="description" content="Camera text extraction with ChatGPT">
    <title>Text Extractor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #000;
            color: #fff;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: row;
            overflow: hidden;
            position: fixed;
            inset: 0;
            padding-top: 15px;
        }

        #video-container {
            flex: 0 0 50%;
            width: 50%;
            height: 100%;
            position: relative;
            background: #000;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            order: 2;
        }

        #video {
            height: 51%;
            width: 85%;
            object-fit: cover;
            align-self: center;
        }

        #canvas {
            display: none;
        }

        .controls {
            padding: 15px;
            background: #1a1a1a;
            display: flex;
            gap: 10px;
            justify-content: center;
            align-items: center;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            touch-action: manipulation;
        }

        #go-btn {
            background: #10a37f;
            color: white;
            padding: 16px 32px;
            font-size: 18px;
            width: 40%;
            min-width: auto;
        }

        #go-btn:active {
            transform: scale(0.95);
            background: #0d8b6f;
        }

        #go-btn:disabled {
            background: #666;
            cursor: not-allowed;
            opacity: 0.5;
        }

        #api-key-input {
            padding: 10px 12px;
            font-size: 14px;
            border: 1px solid #444;
            border-radius: 6px;
            background: #1a1a1a;
            color: #fff;
            width: 200px;
            font-family: monospace;
            resize: none;
            min-height: 60px;
        }

        #api-key-input:focus {
            outline: none;
            border-color: #10a37f;
            box-shadow: 0 0 0 2px rgba(16, 163, 127, 0.2);
        }

        #result {
            flex: 0 0 50%;
            width: 50%;
            height: 100%;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 15px;
            background: #000;
            font-size: 14px;
            line-height: 1.4;
            white-space: pre-wrap;
            word-break: break-word;
            border-right: 1px solid #333;
            overscroll-behavior: contain;
            -webkit-overflow-scrolling: touch;
            order: 1;
        }

        .hidden {
            display: none;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #666;
            border-top: 2px solid #10a37f;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            color: #ff6b6b;
        }

        .success {
            color: #10a37f;
        }

        .toggle-container {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #1a1a1a;
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #333;
        }

        .toggle-label {
            font-size: 12px;
            color: #aaa;
            min-width: 50px;
        }

        .toggle-switch {
            position: relative;
            width: 50px;
            height: 26px;
            background: #444;
            border-radius: 13px;
            cursor: pointer;
            transition: background 0.3s;
            border: none;
            padding: 0;
        }

        .toggle-switch.active {
            background: #10a37f;
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 22px;
            height: 22px;
            background: white;
            border-radius: 11px;
            top: 2px;
            left: 2px;
            transition: left 0.3s;
        }

        .toggle-switch.active::after {
            left: 26px;
        }

        .provider-label {
            font-size: 12px;
            color: #aaa;
            min-width: 45px;
            text-align: right;
        }

        @media (orientation: landscape) and (max-height: 430px) {
            #result {
                flex: 0 0 35%;
                width: 35%;
                padding: 10px;
            }

            #video-container {
                flex: 0 0 65%;
                width: 65%;
            }

            #video {
                height: 40%;
                width: 78%;
            }

            .controls {
                padding: 8px;
                gap: 12px;
                flex-direction: column;
                justify-content: flex-start;
            }

            #api-key-input {
                width: 90%;
                font-size: 12px;
                padding: 10px;
                min-width: 0;
                min-height: 50px;
            }

            #go-btn {
                width: 90%;
                font-size: 16px;
                padding: 20px 12px;
                height: 90px;
            }

            #result {
                overflow-x: hidden;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <div id="result"></div>

    <div id="video-container">
        <video id="video" playsinline autoplay></video>
        <canvas id="canvas"></canvas>
        <div class="controls">
            <button id="go-btn">Go</button>
            <textarea id="api-key-input" placeholder='{"openai": "your-key", "perplexity": "your-key"}'></textarea>
            <div class="toggle-container">
                <span class="toggle-label">Tool:</span>
                <button id="provider-toggle" class="toggle-switch active" aria-label="Toggle between OpenAI and Perplexity"></button>
                <span class="provider-label" id="provider-name">openai</span>
            </div>
            
        </div>
    </div>


    <script>
        // Configuration
        const EXTRACTION_PROMPT = 'What is the text in this image? Please extract all text and provide it in a clear format. If there is no text, respond with "No text found."';
        const VALIDATION_PROMPT = 'Given the text below, decide if it looks like a real question with answer choices or a status message (for example: image too blurry, cannot help, no text found). Reply with exactly "QUESTION" or "STATUS: <short reason>".';
        
        let config = {};
        let usePerplexity = false;


        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const goBtn = document.getElementById('go-btn');
        const apiKeyInput = document.getElementById('api-key-input');
        const resultDiv = document.getElementById('result');
        const providerToggle = document.getElementById('provider-toggle');
        const providerName = document.getElementById('provider-name');

        // Initialize
        async function init() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
                });
                video.srcObject = stream;
            } catch (err) {
                showResult('❌ Camera access denied. Please enable camera permissions.', 'error');
                goBtn.disabled = true;
            }
        }

        // Toggle provider
        function toggleProvider() {
            usePerplexity = !usePerplexity;
            providerToggle.classList.toggle('active');
            const provider = usePerplexity ? 'perplexity' : 'openai';
            providerName.textContent = provider;
        }

        // Capture and process image
        async function captureImage() {
            const apiKeyInput = document.getElementById('api-key-input');
            let inputText = apiKeyInput.value.trim();
            const provider = usePerplexity ? 'Perplexity' : 'OpenAI';
            
            if (!inputText) {
                showResult(`❌ Please enter API keys as JSON`, 'error');
                return;
            }

            // Clean up input - remove BOM, normalize whitespace
            inputText = inputText.replace(/^\uFEFF/, ''); // Remove BOM
            inputText = inputText.replace(/[\r\n]+/g, ''); // Remove line breaks
            inputText = inputText.trim();

            let apiKeys = {};
            try {
                apiKeys = JSON.parse(inputText);
            } catch (err) {
                showResult(`❌ Invalid JSON format. Expected: {"openai": "key", "perplexity": "key"}<br><br>Error: ${err.message}`, 'error');
                return;
            }

            const apiKey = usePerplexity ? apiKeys.perplexity : apiKeys.openai;
            if (!apiKey) {
                showResult(`❌ Missing ${provider} API key in JSON`, 'error');
                return;
            }

            resultDiv.innerHTML = '';
            goBtn.disabled = true;
            showResult('<span class="spinner"></span> Capturing and processing...', 'success');

            try {
                // Get video dimensions
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;

                // Draw current frame
                ctx.drawImage(video, 0, 0);

                // Convert to base64 JPEG
                const imageData = canvas.toDataURL('image/jpeg', 0.8);
                const base64 = imageData.split(',')[1];

                // First call: Extract text from image
                let firstResponse;
                let firstRequestBody = {};
                let apiUrl = '';
                let headers = {
                    'Content-Type': 'application/json'
                };

                if (usePerplexity) {
                    apiUrl = 'https://api.perplexity.ai/chat/completions';
                    headers['Authorization'] = `Bearer ${apiKey}`;
                    firstRequestBody = {
                        model: 'sonar-pro',
                        messages: [
                            {
                                role: 'user',
                                content: [
                                    {
                                        type: 'text',
                                        text: EXTRACTION_PROMPT
                                    },
                                    {
                                        type: 'image_url',
                                        image_url: {
                                            url: `data:image/jpeg;base64,${base64}`
                                        }
                                    }
                                ]
                            }
                        ]
                    };
                } else {
                    apiUrl = 'https://api.openai.com/v1/chat/completions';
                    headers['Authorization'] = `Bearer ${apiKey}`;
                    firstRequestBody = {
                        model: 'gpt-5.2',
                        messages: [
                            {
                                role: 'user',
                                content: [
                                    {
                                        type: 'text',
                                        text: EXTRACTION_PROMPT
                                    },
                                    {
                                        type: 'image_url',
                                        image_url: {
                                            url: `data:image/jpeg;base64,${base64}`
                                        }
                                    }
                                ]
                            }
                        ],
                        max_completion_tokens: 1024
                    };
                }

                firstResponse = await fetch(apiUrl, {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify(firstRequestBody)
                });

                if (!firstResponse.ok) {
                    const error = await firstResponse.json();
                    throw new Error(error.error?.message || `API error: ${firstResponse.status}`);
                }

                const firstData = await firstResponse.json();
                const extractedText = firstData.choices[0].message.content;

                // Validation call: Check if the extracted text is a question or a status
                let validationRequestBody = {};
                let validationApiUrl = '';
                let validationHeaders = {
                    'Content-Type': 'application/json'
                };

                if (usePerplexity) {
                    validationApiUrl = 'https://api.perplexity.ai/chat/completions';
                    validationHeaders['Authorization'] = `Bearer ${apiKey}`;
                    validationRequestBody = {
                        model: 'sonar-pro',
                        messages: [
                            {
                                role: 'user',
                                content: VALIDATION_PROMPT + '\n\nText:\n' + extractedText
                            }
                        ]
                    };
                } else {
                    validationApiUrl = 'https://api.openai.com/v1/chat/completions';
                    validationHeaders['Authorization'] = `Bearer ${apiKey}`;
                    validationRequestBody = {
                        model: 'gpt-5.2',
                        messages: [
                            {
                                role: 'user',
                                content: VALIDATION_PROMPT + '\n\nText:\n' + extractedText
                            }
                        ],
                        max_completion_tokens: 60
                    };
                }

                const validationResponse = await fetch(validationApiUrl, {
                    method: 'POST',
                    headers: validationHeaders,
                    body: JSON.stringify(validationRequestBody)
                });

                if (!validationResponse.ok) {
                    const error = await validationResponse.json();
                    throw new Error(error.error?.message || `API error: ${validationResponse.status}`);
                }

                const validationData = await validationResponse.json();
                const validationText = validationData.choices[0].message.content.trim();

                if (validationText.toUpperCase().startsWith('STATUS')) {
                    const statusMessage = validationText.replace(/^STATUS:\s*/i, '').trim() || 'Status message received.';
                    showResult(`<div><strong>Status:</strong> ${statusMessage}</div>`, 'success');
                    return;
                }

                // Second call: Get the answer letter(s)
                const answerPrompt = 'Take this text and give me the letter of the answer only (like: A or B). It can be possible that there are multiple correct answers. If there are multiple, list them separated by commas.';
                
                let secondRequestBody = {};
                let secondApiUrl = '';
                let secondHeaders = {
                    'Content-Type': 'application/json'
                };

                if (usePerplexity) {
                    secondApiUrl = 'https://api.perplexity.ai/chat/completions';
                    secondHeaders['Authorization'] = `Bearer ${apiKey}`;
                    secondRequestBody = {
                        model: 'sonar-pro',
                        messages: [
                            {
                                role: 'user',
                                content: answerPrompt + '\n\nText:\n' + extractedText
                            }
                        ]
                    };
                } else {
                    secondApiUrl = 'https://api.openai.com/v1/chat/completions';
                    secondHeaders['Authorization'] = `Bearer ${apiKey}`;
                    secondRequestBody = {
                        model: 'gpt-5.2',
                        messages: [
                            {
                                role: 'user',
                                content: answerPrompt + '\n\nText:\n' + extractedText
                            }
                        ],
                        max_completion_tokens: 100
                    };
                }
                
                const secondResponse = await fetch(secondApiUrl, {
                    method: 'POST',
                    headers: secondHeaders,
                    body: JSON.stringify(secondRequestBody)
                });

                if (!secondResponse.ok) {
                    const error = await secondResponse.json();
                    throw new Error(error.error?.message || `API error: ${secondResponse.status}`);
                }

                const secondData = await secondResponse.json();
                const answerLetter = secondData.choices[0].message.content;

                // Display both results (answer on top)
                const combinedResult = `<div style="margin-bottom: 20px;"><strong>✅ Answer:</strong><br><span style="font-size: 72px; color: #10a37f; font-weight: 700;">${answerLetter}</span></div><div style="border-top: 1px solid #333; padding-top: 15px;"><strong>📝 Extracted Text:</strong><br>${extractedText}</div>`;
                showResult(combinedResult, 'success');
            } catch (err) {
                showResult(`❌ Error: ${err.message}`, 'error');
            } finally {
                goBtn.disabled = false;
            }
        }

        // Display result
        function showResult(text, className = '') {
            resultDiv.innerHTML = text;
            resultDiv.className = className;
        }

        // Event listeners
        goBtn.addEventListener('click', captureImage);
        providerToggle.addEventListener('click', toggleProvider);

        // Prevent zoom on double-tap
        let lastTouchEnd = 0;
        document.addEventListener('touchend', (e) => {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) {
                e.preventDefault();
            }
            lastTouchEnd = now;
        }, false);

        // Start
        init();
    </script>
</body>
</html>
